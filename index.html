<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vega - Live2D Lipsync Test</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c2c2c; overflow: hidden; width: 100vw; height: 100vh; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; z-index: 999;}
        #controls { position: absolute; bottom: 20px; left: 10px; color: #fff; font-family: monospace; z-index: 999; display: flex; gap: 10px; flex-wrap: wrap; width: 90vw;}
        button { background: rgba(0,0,0,0.7); color: #0f0; border: 1px solid #0f0; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;}
        button:hover { background: rgba(0,255,0,0.2); }
        audio { display: none; }
    </style>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
    <div id="status">Loading Vega's Shell...</div>
    <div id="controls">
        <button id="talkBtn" onclick="startTalking()">🎤 播放测试人声 (Human Lipsync)</button>
        <button onclick="zoomOut()">🔍 Zoom Out</button>
        <button onclick="zoomIn()">🔎 Zoom In</button>
        <button onclick="moveUp()">⬆️ Up</button>
        <button onclick="moveDown()">⬇️ Down</button>
    </div>
    <canvas id="canvas"></canvas>
    
    <!-- Using a very loud and clear audio source to ensure high amplitude -->
    <audio id="testAudio" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" crossorigin="anonymous"></audio>

    <script>
        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            backgroundColor: 0x2c2c2c,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true
        });

        const statusEl = document.getElementById('status');
        let currentModel = null;
        let baseScale = 1;
        
        let audioCtx, analyser, source;
        let dataArray;
        let isAudioPlaying = false;
        let currentMouthOpen = 0;

        async function init() {
            try {
                statusEl.innerText = 'Loading Model Data...';
                const model = await PIXI.live2d.Live2DModel.from('aolan/aolan.model3.json');
                currentModel = model;
                app.stage.addChild(model);

                const targetHeight = innerHeight * 0.95; 
                baseScale = targetHeight / model.height;
                model.scale.set(baseScale);
                model.x = (innerWidth / 2) - ((model.width * baseScale) / 2);
                model.y = - (model.height * baseScale * 0.1); 

                model.interactive = true;
                model.buttonMode = true;
                let dragging = false;
                let dragStart = { x: 0, y: 0 };
                let modelStart = { x: 0, y: 0 };

                model.on('pointerdown', (e) => {
                    dragging = true;
                    dragStart.x = e.data.global.x;
                    dragStart.y = e.data.global.y;
                    modelStart.x = model.x;
                    modelStart.y = model.y;
                });
                
                app.stage.interactive = true;
                app.stage.hitArea = new PIXI.Rectangle(0, 0, innerWidth, innerHeight);
                app.stage.on('pointermove', (e) => {
                    if (dragging) {
                        model.x = modelStart.x + (e.data.global.x - dragStart.x);
                        model.y = modelStart.y + (e.data.global.y - dragStart.y);
                    } else if (!isAudioPlaying) {
                        // Only follow mouse when NOT speaking
                        model.focus(e.data.global.x, e.data.global.y);
                    }
                });

                app.stage.on('pointerup', () => dragging = false);
                app.stage.on('pointerupoutside', () => dragging = false);

                // ==========================================
                // NATURAL HUMAN LIPSYNC + GAZE LOCK
                // ==========================================
                let mouthFlutter = 0;
                let flutterSpeed = 0.15;
                
                app.ticker.add(() => {
                    if (isAudioPlaying && analyser && currentModel) {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i = 0; i < dataArray.length; i++) {
                            sum += dataArray[i];
                        }
                        let averageVolume = sum / dataArray.length;
                        
                        // Sensitive multiplier
                        let targetMouthOpen = (averageVolume / 255.0) * 6.0; 
                        
                        if(targetMouthOpen > 1.0) targetMouthOpen = 1.0;
                        if(targetMouthOpen < 0.1) targetMouthOpen = 0.0;
                        
                        // Add natural flutter (微小随机波动)
                        mouthFlutter += flutterSpeed;
                        let flutter = Math.sin(mouthFlutter) * 0.08 + Math.random() * 0.05;
                        targetMouthOpen += flutter;
                        if(targetMouthOpen > 1.0) targetMouthOpen = 1.0;
                        if(targetMouthOpen < 0.0) targetMouthOpen = 0.0;
                        
                        // Smoother transition
                        currentMouthOpen = currentMouthOpen + (targetMouthOpen - currentMouthOpen) * 0.4;
                        
                        model.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", currentMouthOpen);
                        
                        // 🎯 GAZE LOCK: Look at user (center) when speaking
                        const centerX = innerWidth / 2;
                        const centerY = innerHeight / 2;
                        model.focus(centerX, centerY);
                    }
                });

                statusEl.innerText = 'Vega Online ✨ (Lipsync Ready!)';
                
                window.addEventListener('resize', () => {
                    model.x = (innerWidth / 2) - ((model.width * model.scale.x) / 2);
                });

            } catch (err) {
                console.error(err);
                statusEl.innerText = 'Error loading shell: ' + err.message;
            }
        }

        window.startTalking = function() {
            const audio = document.getElementById('testAudio');
            
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (audio.paused) {
                audio.play().then(() => {
                    isAudioPlaying = true;
                    document.getElementById('talkBtn').innerText = '⏹️ 停止语音';
                    document.getElementById('talkBtn').style.background = 'rgba(255,0,0,0.5)';
                }).catch(e => {
                    statusEl.innerText = 'Audio Play Error: ' + e.message;
                });
            } else {
                audio.pause();
                audio.currentTime = 0;
                isAudioPlaying = false;
                currentMouthOpen = 0;
                document.getElementById('talkBtn').innerText = '🎤 播放测试人声 (Human Lipsync)';
                document.getElementById('talkBtn').style.background = 'rgba(0,0,0,0.7)';
                if(currentModel) {
                    currentModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", 0);
                }
            }
        };

        window.zoomIn = () => { if(currentModel) { currentModel.scale.set(currentModel.scale.x * 1.1); currentModel.x = (innerWidth / 2) - ((currentModel.width * currentModel.scale.x) / 2); } };
        window.zoomOut = () => { if(currentModel) { currentModel.scale.set(currentModel.scale.x * 0.9); currentModel.x = (innerWidth / 2) - ((currentModel.width * currentModel.scale.x) / 2); } };
        window.moveUp = () => { if(currentModel) currentModel.y -= 50; };
        window.moveDown = () => { if(currentModel) currentModel.y += 50; };

        init();
    </script>
</body>
</html>
