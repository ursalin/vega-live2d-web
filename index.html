<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vega - Live2D Lipsync Test</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c2c2c; overflow: hidden; width: 100vw; height: 100vh; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; z-index: 999;}
        #controls { position: absolute; bottom: 20px; left: 10px; color: #fff; font-family: monospace; z-index: 999; display: flex; gap: 10px; flex-wrap: wrap; width: 90vw;}
        button { background: rgba(0,0,0,0.7); color: #0f0; border: 1px solid #0f0; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;}
        button:hover { background: rgba(0,255,0,0.2); }
        audio { display: none; }
    </style>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
    <div id="status">Loading Vega's Shell...</div>
    <div id="controls">
        <button id="talkBtn" onclick="startTalking()">🎤 播放测试人声 (Human Lipsync)</button>
        <button onclick="zoomOut()">🔍 Zoom Out</button>
        <button onclick="zoomIn()">🔎 Zoom In</button>
        <button onclick="moveUp()">⬆️ Up</button>
        <button onclick="moveDown()">⬇️ Down</button>
    </div>
    <canvas id="canvas"></canvas>
    
    <!-- Using a very loud and clear audio source to ensure high amplitude -->
    <audio id="testAudio" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" crossorigin="anonymous"></audio>

    <script>
        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            backgroundColor: 0x2c2c2c,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true
        });

        const statusEl = document.getElementById('status');
        let currentModel = null;
        let baseScale = 1;

        // Audio analysis
        let audioCtx, analyser, source;
        let dataArray;
        let isAudioPlaying = false;

        // Smoothed animation state
        let mouthEnvelope = 0;     // post attack/release
        let mouthFormSmooth = 0;
        let gazeAngleX = 0, gazeAngleY = 0;
        let gazeEyeX = 0,   gazeEyeY = 0;
        let mouseX = 0, mouseY = 0;
        let lastMouseMoveAt = 0;

        // Blink state machine
        let blinkValue = 1;
        let blinkPhase = 'idle';   // 'idle' | 'closing' | 'opening'
        let blinkPhaseStart = 0;
        let nextBlinkAt = performance.now() + 1500;

        // Breath
        let breathPhase = 0;
        let breathAmp = 0.5;

        function setParam(core, id, v) {
            try { core.setParameterValueById(id, v); } catch (e) { /* param may not exist */ }
        }

        async function init() {
            try {
                statusEl.innerText = 'Loading Model Data...';
                const model = await PIXI.live2d.Live2DModel.from('aolan/aolan.model3.json');
                currentModel = model;
                app.stage.addChild(model);

                const targetHeight = innerHeight * 0.95; 
                baseScale = targetHeight / model.height;
                model.scale.set(baseScale);
                model.x = (innerWidth / 2) - ((model.width * baseScale) / 2);
                model.y = - (model.height * baseScale * 0.1); 

                model.interactive = true;
                model.buttonMode = true;
                let dragging = false;
                let dragStart = { x: 0, y: 0 };
                let modelStart = { x: 0, y: 0 };

                model.on('pointerdown', (e) => {
                    dragging = true;
                    dragStart.x = e.data.global.x;
                    dragStart.y = e.data.global.y;
                    modelStart.x = model.x;
                    modelStart.y = model.y;
                });
                
                app.stage.interactive = true;
                app.stage.hitArea = new PIXI.Rectangle(0, 0, innerWidth, innerHeight);
                app.stage.on('pointermove', (e) => {
                    if (dragging) {
                        model.x = modelStart.x + (e.data.global.x - dragStart.x);
                        model.y = modelStart.y + (e.data.global.y - dragStart.y);
                    } else {
                        mouseX = e.data.global.x;
                        mouseY = e.data.global.y;
                        lastMouseMoveAt = performance.now();
                    }
                });

                app.stage.on('pointerup', () => dragging = false);
                app.stage.on('pointerupoutside', () => dragging = false);

                // Disable the library's built-in focus tracker — we drive gaze ourselves
                // so it can be smoothly recentered while speaking.
                if (model.internalModel.focusController) {
                    const fc = model.internalModel.focusController;
                    fc.focus = function () {};
                }

                // ==========================================
                // NATURAL LIPSYNC + GAZE + BLINK + BREATH
                // ==========================================
                app.ticker.add(() => {
                    if (!currentModel) return;
                    const core = currentModel.internalModel.coreModel;
                    const now = performance.now();
                    const dt = Math.min(0.05, app.ticker.deltaMS / 1000);

                    // ---------- Lipsync envelope ----------
                    let target = 0;
                    if (isAudioPlaying && analyser) {
                        analyser.getByteFrequencyData(dataArray);
                        // Speech band: with sampleRate 44100 & fftSize 256, each bin ≈ 172Hz.
                        // Bins 1..22 cover ~170Hz–3800Hz, where vowels/consonants live.
                        let sum = 0, count = 0;
                        for (let i = 1; i < 22 && i < dataArray.length; i++) {
                            sum += dataArray[i];
                            count++;
                        }
                        const avg = (sum / count) / 255;
                        target = Math.min(1, Math.max(0, (avg - 0.04) * 2.6));
                    }
                    // Asymmetric envelope: open quickly, close slowly — like real jaws.
                    const rising = target > mouthEnvelope;
                    const k = 1 - Math.exp(-dt / (rising ? 0.035 : 0.085));
                    mouthEnvelope += (target - mouthEnvelope) * k;

                    // Drive jaw + mouth together, with a subtle vowel-shape variation.
                    const formNoise = (Math.sin(now * 0.011) * 0.6 + Math.sin(now * 0.027) * 0.4);
                    const formTarget = mouthEnvelope > 0.08 ? formNoise * 0.25 : 0;
                    mouthFormSmooth += (formTarget - mouthFormSmooth) * 0.08;

                    setParam(core, 'ParamMouthOpenY', mouthEnvelope);
                    setParam(core, 'ParamJawOpen',    mouthEnvelope * 0.6);
                    setParam(core, 'ParamMouthForm',  mouthFormSmooth);

                    // ---------- Gaze ----------
                    // Speaking: lock to center (viewer).
                    // Not speaking: follow the mouse at its last known position.
                    //   If the page just loaded and mouse was never moved, do idle sway instead.
                    let targetAngleX = 0, targetAngleY = 0, targetEyeX = 0, targetEyeY = 0;
                    if (!isAudioPlaying) {
                        if (lastMouseMoveAt > 0) {
                            // Always follow the last known mouse position — no timeout.
                            const nx = (mouseX / innerWidth)  * 2 - 1;
                            const ny = (mouseY / innerHeight) * 2 - 1;
                            targetAngleX =  nx * 22;
                            targetAngleY = -ny * 18;
                            targetEyeX   =  nx * 0.7;
                            targetEyeY   = -ny * 0.7;
                        } else {
                            // No mouse input yet — gentle idle sway so she doesn't freeze.
                            const swayX = Math.sin(now * 0.00055) * 7 + Math.sin(now * 0.00097) * 3;
                            const swayY = Math.sin(now * 0.00078) * 2.5;
                            targetAngleX = swayX;
                            targetAngleY = swayY;
                            targetEyeX   = swayX / 35;
                            targetEyeY   = swayY / 35;
                        }
                    }

                    // One-pole smoothing — speaking pulls back faster so she snaps to viewer.
                    const gazeTau = isAudioPlaying ? 0.18 : 0.12;
                    const gk = 1 - Math.exp(-dt / gazeTau);
                    gazeAngleX += (targetAngleX - gazeAngleX) * gk;
                    gazeAngleY += (targetAngleY - gazeAngleY) * gk;
                    gazeEyeX   += (targetEyeX   - gazeEyeX)   * gk;
                    gazeEyeY   += (targetEyeY   - gazeEyeY)   * gk;

                    // Body lags behind head with a larger ratio when idle so arms get
                    // physically dragged along — the bigger the body sway the more the
                    // physics engine carries the sleeves and hands.
                    const bodyMult = isAudioPlaying ? 0.3 : 0.55;
                    setParam(core, 'ParamAngleX',     gazeAngleX);
                    setParam(core, 'ParamAngleY',     gazeAngleY);
                    setParam(core, 'ParamAngleZ',     gazeAngleX * 0.25);
                    setParam(core, 'ParamEyeBallX',   gazeEyeX);
                    setParam(core, 'ParamEyeBallY',   gazeEyeY);
                    setParam(core, 'ParamBodyAngleX', gazeAngleX * bodyMult);
                    setParam(core, 'ParamBodyAngleY', gazeAngleY * (bodyMult * 0.6));
                    setParam(core, 'ParamBodyAngleZ', gazeAngleX * 0.12);

                    // ---------- Blink ----------
                    if (blinkPhase === 'idle' && now >= nextBlinkAt) {
                        blinkPhase = 'closing';
                        blinkPhaseStart = now;
                    }
                    if (blinkPhase === 'closing') {
                        const t = (now - blinkPhaseStart) / 80;
                        blinkValue = Math.max(0, 1 - t);
                        if (t >= 1) { blinkPhase = 'opening'; blinkPhaseStart = now; }
                    } else if (blinkPhase === 'opening') {
                        const t = (now - blinkPhaseStart) / 120;
                        blinkValue = Math.min(1, t);
                        if (t >= 1) {
                            blinkPhase = 'idle';
                            blinkValue = 1;
                            // Occasional double-blink for life
                            const doubleBlink = Math.random() < 0.12;
                            nextBlinkAt = now + (doubleBlink ? 180 : 2500 + Math.random() * 3500);
                        }
                    }
                    setParam(core, 'ParamEyeLOpen', blinkValue);
                    setParam(core, 'ParamEyeROpen', blinkValue);

                    // ---------- Breath ----------
                    // Collapse amplitude while speaking so physics-driven head sway
                    // doesn't pull the gaze off-center. Smooth transition in/out.
                    const breathAmpTarget = isAudioPlaying ? 0.04 : 0.5;
                    breathAmp += (breathAmpTarget - breathAmp) * (1 - Math.exp(-dt / 0.4));
                    breathPhase += dt * 1.1;
                    setParam(core, 'ParamBreath', Math.sin(breathPhase) * breathAmp + 0.5);
                });

                statusEl.innerText = 'Vega Online ✨ (Lipsync Ready!)';
                
                window.addEventListener('resize', () => {
                    model.x = (innerWidth / 2) - ((model.width * model.scale.x) / 2);
                });

            } catch (err) {
                console.error(err);
                statusEl.innerText = 'Error loading shell: ' + err.message;
            }
        }

        window.startTalking = function() {
            const audio = document.getElementById('testAudio');
            
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            audio.onended = () => {
                isAudioPlaying = false;
                document.getElementById('talkBtn').innerText = '🎤 播放测试人声 (Human Lipsync)';
                document.getElementById('talkBtn').style.background = 'rgba(0,0,0,0.7)';
            };

            if (audio.paused) {
                audio.play().then(() => {
                    isAudioPlaying = true;
                    document.getElementById('talkBtn').innerText = '⏹️ 停止语音';
                    document.getElementById('talkBtn').style.background = 'rgba(255,0,0,0.5)';
                }).catch(e => {
                    statusEl.innerText = 'Audio Play Error: ' + e.message;
                });
            } else {
                audio.pause();
                audio.currentTime = 0;
                isAudioPlaying = false;
                document.getElementById('talkBtn').innerText = '🎤 播放测试人声 (Human Lipsync)';
                document.getElementById('talkBtn').style.background = 'rgba(0,0,0,0.7)';
                // Mouth envelope, gaze, etc. all release naturally in the ticker.
            }
        };

        window.zoomIn = () => { if(currentModel) { currentModel.scale.set(currentModel.scale.x * 1.1); currentModel.x = (innerWidth / 2) - ((currentModel.width * currentModel.scale.x) / 2); } };
        window.zoomOut = () => { if(currentModel) { currentModel.scale.set(currentModel.scale.x * 0.9); currentModel.x = (innerWidth / 2) - ((currentModel.width * currentModel.scale.x) / 2); } };
        window.moveUp = () => { if(currentModel) currentModel.y -= 50; };
        window.moveDown = () => { if(currentModel) currentModel.y += 50; };

        init();
    </script>
</body>
</html>
