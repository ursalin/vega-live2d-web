<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vega</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #1a1a2e; overflow: hidden; width: 100vw; height: 100vh; font-family: monospace; }
    canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── Top bar ── */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; padding: 0 10px; gap: 8px;
      background: linear-gradient(#0006, transparent); z-index: 100; pointer-events: none;
    }
    #status { color: #aef; font-size: 12px; flex: 1; pointer-events: none; }
    #topbar button { pointer-events: all; background: rgba(0,0,0,.55); color: #0f0;
      border: 1px solid #0f04; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 16px; }
    #topbar button:hover { background: rgba(0,255,0,.15); }
    #cameraFlipBtn { display: none; }
    #callBtn.call-active {
      background: rgba(255,60,60,.4); color: #fff; border-color: #f44;
      animation: callPulse 1.4s infinite;
    }
    @keyframes callPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,60,60,.6); }
      50%     { box-shadow: 0 0 0 8px rgba(255,60,60,0); }
    }

    /* ── Camera PiP ── */
    #cameraPip {
      display: none; position: absolute; top: 52px; right: 10px;
      width: 160px; height: 120px; border-radius: 10px; overflow: hidden;
      border: 1px solid #0f04; z-index: 100; background: #000;
    }
    #cameraPreview { width: 100%; height: 100%; object-fit: cover; }

    /* ── Chat history ── */
    #chatHistory {
      display: none; position: absolute; bottom: 70px; left: 0; right: 0;
      max-height: 40vh; overflow-y: auto; padding: 8px 12px;
      display: flex; flex-direction: column; gap: 6px; z-index: 100;
      pointer-events: none;
    }
    .bubble { max-width: 75%; padding: 8px 12px; border-radius: 14px;
      font-size: 13px; line-height: 1.45; word-break: break-word; pointer-events: all; }
    .bubble-user      { align-self: flex-end; background: #0f3460; color: #ddf; border-bottom-right-radius: 4px; }
    .bubble-assistant { align-self: flex-start; background: #533483; color: #ffe; border-bottom-left-radius: 4px; }
    .bubble-system    { align-self: center; background: #2a2a2a; color: #f88; font-size: 11px; border-radius: 8px; padding: 4px 10px; }

    /* ── Chat bar ── */
    #chatBar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: flex-end; gap: 6px;
      padding: 8px 10px 10px; background: linear-gradient(transparent, #0009 60%);
    }
    #chatInput {
      flex: 1; resize: none; background: rgba(0,0,0,.6); color: #eef;
      border: 1px solid #0f04; border-radius: 10px; padding: 8px 12px;
      font-size: 14px; font-family: monospace; outline: none; min-height: 38px; max-height: 120px;
    }
    #chatInput::placeholder { color: #558; }
    #chatBar button {
      background: rgba(0,0,0,.65); color: #0f0; border: 1px solid #0f04;
      border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 18px; flex-shrink: 0;
    }
    #chatBar button:hover  { background: rgba(0,255,0,.18); }
    #chatBar button:disabled { opacity: .4; cursor: default; }
    #snapBtn { display: none; font-size: 16px; }
    #snapBtn.snapped { background: rgba(255,160,0,.35); color: #fa0; border-color: #fa0; }

    /* ── Expression bar ── */
    #exprBar {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 6px; z-index: 100;
    }
    #exprBar button {
      width: 40px; height: 40px; border-radius: 50%; font-size: 18px;
      background: rgba(0,0,0,.55); color: #ffd; border: 1px solid #0f04;
      cursor: pointer;
    }
    #exprBar button:hover { background: rgba(255,200,0,.25); border-color: #fc4; }

    /* ── Dev controls (collapsed) ── */
    #devToggle {
      position: absolute; bottom: 10px; right: 10px; z-index: 200;
      font-size: 11px; color: #555; cursor: pointer; background: none; border: none;
    }
    #devControls {
      display: none; position: absolute; bottom: 30px; right: 10px; z-index: 200;
      display: flex; flex-direction: column; gap: 4px; align-items: flex-end;
    }
    #devControls button {
      background: rgba(0,0,0,.7); color: #0f0; border: 1px solid #0f0;
      padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px;
    }

    /* ── Settings drawer ── */
    #settingsPanel {
      position: fixed; top: 0; right: -100%; width: min(360px, 100vw); height: 100vh;
      background: #16213e; color: #cce; z-index: 300; transition: right .28s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #settingsPanel.open { right: 0; }
    .sp-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; background: #0f3460; font-size: 15px; font-weight: bold;
    }
    .sp-header button { background: none; border: none; color: #aef; font-size: 18px; cursor: pointer; }
    .sp-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
    .sp-body label { font-size: 12px; color: #8af; margin-top: 4px; }
    .sp-body input, .sp-body select, .sp-body textarea {
      background: #0d1b2a; color: #ddf; border: 1px solid #0f34; border-radius: 6px;
      padding: 6px 8px; font-size: 13px; width: 100%; font-family: monospace;
    }
    .sp-body input[type=checkbox] { width: auto; }
    .sp-body input[type=range]    { padding: 0; }
    .sp-section { font-size: 13px; font-weight: bold; color: #6af; padding: 8px 0 2px; border-top: 1px solid #0f34; }
    .sp-save-btn {
      margin-top: 16px; padding: 10px; background: #0f3460; color: #0f0;
      border: 1px solid #0f0; border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .sp-save-btn:hover { background: rgba(0,255,0,.15); }
  </style>

  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>

<div id="topbar">
  <span id="status">Loading Vega...</span>
  <button onclick="zoomOut()">－</button>
  <button onclick="zoomIn()">＋</button>
  <button id="cameraBtn"    onclick="toggleCamera()">📷</button>
  <button id="cameraFlipBtn" onclick="flipCamera()">🔄</button>
  <button id="callBtn"       onclick="toggleCall()" title="视频通话">📞</button>
  <button onclick="openSettings()">⚙️</button>
</div>

<div id="cameraPip"><video id="cameraPreview" muted playsinline></video></div>

<canvas id="canvas"></canvas>

<div id="chatHistory"></div>

<div id="chatBar">
  <button id="snapBtn" onclick="toggleSnap()" title="附上当前画面">📸</button>
  <textarea id="chatInput" placeholder="和 Vega 说点什么…" rows="1"></textarea>
  <button id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<div id="exprBar">
  <button onclick="setExpr('expression3')" title="星星眼">⭐</button>
  <button onclick="setExpr('expression2')" title="脸红">🥰</button>
  <button onclick="setExpr('expression1')" title="脸黑">😒</button>
  <button onclick="clearExpr()" title="还原">↺</button>
</div>

<button id="devToggle" onclick="document.getElementById('devControls').style.display=document.getElementById('devControls').style.display==='flex'?'none':'flex'">DEV</button>
<div id="devControls" style="display:none">
  <button onclick="startTalking()">🎤 测试音频</button>
  <button onclick="clearChat()">🗑 清空对话</button>
  <button onclick="zoomIn()">🔎 Zoom In</button>
  <button onclick="zoomOut()">🔍 Zoom Out</button>
  <button onclick="moveUp()">⬆️ Up</button>
  <button onclick="moveDown()">⬇️ Down</button>
  <div style="color:#0f0;font-size:11px;margin-top:6px">── 参数探索 ──</div>
  <button onclick="dumpParams()">📋 列出所有参数(看Console)</button>
  <button onclick="cycleAllParams()">▶ 循环测试每个参数</button>
  <div style="display:flex;align-items:center;gap:6px">
    <span style="color:#0f0;font-size:11px;width:56px">Param<span id="lbP1">0.0</span></span>
    <input type="range" min="-1" max="1" step="0.01" value="0" style="width:120px"
      oninput="document.getElementById('lbP1').textContent=parseFloat(this.value).toFixed(2);window._dbgP1=parseFloat(this.value)">
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span style="color:#0f0;font-size:11px;width:56px">Param2<span id="lbP2">0.0</span></span>
    <input type="range" min="-1" max="1" step="0.01" value="0" style="width:120px"
      oninput="document.getElementById('lbP2').textContent=parseFloat(this.value).toFixed(2);window._dbgP2=parseFloat(this.value)">
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span style="color:#0f0;font-size:11px;width:56px">Param3<span id="lbP3">0.0</span></span>
    <input type="range" min="-1" max="1" step="0.01" value="0" style="width:120px"
      oninput="document.getElementById('lbP3').textContent=parseFloat(this.value).toFixed(2);window._dbgP3=parseFloat(this.value)">
  </div>
</div>

<div id="settingsPanel"></div>
<audio id="testAudio" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" crossorigin="anonymous" style="display:none"></audio>

<script src="app/settings.js"></script>
<script src="app/camera.js"></script>
<script src="app/chat.js"></script>
<script src="app/call.js"></script>
<script>
  // ── Pixi + Live2D ──
  const app = new PIXI.Application({
    view: document.getElementById('canvas'), autoStart: true, resizeTo: window,
    backgroundColor: 0x1a1a2e, resolution: window.devicePixelRatio || 1, autoDensity: true,
  });

  let currentModel = null;
  let baseScale = 1;

  // Test-audio lipsync state (separate from TTS)
  let testAudioCtx, testAnalyser, testSource, testDataArray;
  window.isAudioPlaying = window.isAudioPlaying || false;

  // Animation state
  let mouthEnvelope = 0, mouthFormSmooth = 0;
  let gazeAngleX = 0, gazeAngleY = 0, gazeEyeX = 0, gazeEyeY = 0;
  let mouseX = 0, mouseY = 0, lastMouseMoveAt = 0;
  let blinkValue = 1, blinkPhase = 'idle', blinkPhaseStart = 0;
  let nextBlinkAt = performance.now() + 1500;
  let breathPhase = 0;
  let speakingSwayPhase = 0;   // gentle head sway while speaking
  let browYS = 0, browAS = 0, browFS = 0;  // smoothed eyebrow targets

  window.interactionState = window.interactionState || 'idle';
  window.glanceRight      = window.glanceRight      || false;

  function setParam(core, id, v) {
    try { core.setParameterValueById(id, v); } catch (_) {}
  }

  async function init() {
    try {
      document.getElementById('status').innerText = 'Loading model...';
      const model = await PIXI.live2d.Live2DModel.from('yinfa/yinfa.model3.json');
      currentModel = model;
      app.stage.addChild(model);

      const targetH = innerHeight * 0.95;
      baseScale = targetH / model.height;
      model.scale.set(baseScale);
      model.x = (innerWidth / 2) - (model.width * baseScale / 2);
      model.y = -(model.height * baseScale * 0.1);

      model.interactive = true; model.buttonMode = true;
      let dragging = false, dragStart = {x:0,y:0}, modelStart = {x:0,y:0};
      model.on('pointerdown', e => {
        dragging = true;
        dragStart.x = e.data.global.x; dragStart.y = e.data.global.y;
        modelStart.x = model.x;        modelStart.y = model.y;
      });

      // Body-part tap detection — Vega reacts to where you poke her
      model.on('pointertap', e => {
        if (!currentModel) return;
        const lx = e.data.global.x - currentModel.x;
        const ly = e.data.global.y - currentModel.y;
        const w  = currentModel.width, h = currentModel.height;
        const xr = lx / w, yr = ly / h;
        let zone;
        if (yr < 0.16)      zone = '头发';
        else if (yr < 0.30) zone = (xr > 0.35 && xr < 0.65) ? '脸' : (xr < 0.5 ? '左耳' : '右耳');
        else if (yr < 0.40) zone = '脖子';
        else if (yr < 0.55) {
          if (xr < 0.28)      zone = '左手';
          else if (xr > 0.72) zone = '右手';
          else                zone = '胸口';
        }
        else if (yr < 0.78) zone = '腰';
        else                zone = '腿';
        window.onBodyTap && window.onBodyTap(zone);
      });

      app.stage.interactive = true;
      app.stage.hitArea = new PIXI.Rectangle(0, 0, innerWidth, innerHeight);

      const recordLookAt = e => { mouseX = e.data.global.x; mouseY = e.data.global.y; lastMouseMoveAt = performance.now(); };
      app.stage.on('pointermove', e => { dragging ? (model.x = modelStart.x + (e.data.global.x - dragStart.x), model.y = modelStart.y + (e.data.global.y - dragStart.y)) : recordLookAt(e); });
      app.stage.on('pointerdown', recordLookAt);
      app.stage.on('pointertap',  recordLookAt);
      app.stage.on('pointerup',   () => dragging = false);
      app.stage.on('pointerupoutside', () => dragging = false);

      if (model.internalModel.focusController) model.internalModel.focusController.focus = () => {};

      // Pinch-to-zoom (mobile)
      let lastPinchDist = null;
      document.addEventListener('touchmove', e => {
        if (e.touches.length !== 2) { lastPinchDist = null; return; }
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        if (lastPinchDist !== null && currentModel) {
          const ratio = dist / lastPinchDist;
          currentModel.scale.set(currentModel.scale.x * ratio);
          currentModel.x = (innerWidth / 2) - (currentModel.width * currentModel.scale.x / 2);
        }
        lastPinchDist = dist;
      }, { passive: false });
      document.addEventListener('touchend', () => { lastPinchDist = null; });

      // ── Main ticker ──
      app.ticker.add(() => {
        if (!currentModel) return;
        const core = currentModel.internalModel.coreModel;
        const now  = performance.now();
        const dt   = Math.min(0.05, app.ticker.deltaMS / 1000);

        // Lipsync — pick active analyser (TTS first, then test audio)
        const activeAnalyser  = window.ttsAnalyser  || testAnalyser;
        const activeDataArray = window.ttsDataArray || testDataArray;
        let target = 0;
        if (window.isAudioPlaying && activeAnalyser && activeDataArray) {
          activeAnalyser.getByteFrequencyData(activeDataArray);
          let sum = 0, cnt = 0;
          for (let i = 1; i < 22 && i < activeDataArray.length; i++) { sum += activeDataArray[i]; cnt++; }
          const avg = (sum / cnt) / 255;
          // Nonlinear compression: noise floor 0.06, soft power curve so mouth
          // has natural dynamics instead of saturating wide-open.
          const x = Math.max(0, avg - 0.06);
          target = Math.min(0.88, Math.pow(x * 5, 0.72));
        }
        const rising = target > mouthEnvelope;
        // Tight timing tracks each syllable (~150-200ms in Chinese speech)
        mouthEnvelope += (target - mouthEnvelope) * (1 - Math.exp(-dt / (rising ? 0.020 : 0.055)));
        const formNoise  = Math.sin(now * 0.011) * 0.6 + Math.sin(now * 0.027) * 0.4;
        const formTarget = mouthEnvelope > 0.08 ? formNoise * 0.25 : 0;
        mouthFormSmooth += (formTarget - mouthFormSmooth) * 0.08;
        setParam(core, 'ParamMouthOpenY', mouthEnvelope);
        setParam(core, 'ParamJawOpen',   mouthEnvelope * 0.6);
        setParam(core, 'ParamMouthForm', mouthFormSmooth);

        // Speaking sway: gentle head oscillation while audio plays
        speakingSwayPhase += dt * 2.4;
        const speaking = window.isAudioPlaying;

        let tAX = 0, tAY = 0, tEX = 0, tEY = 0;
        if (speaking) {
          // Speaking: lock gaze to viewer, head sways gently with voice
          const sway = 0.3 + mouthEnvelope * 0.7;
          tAX = Math.sin(speakingSwayPhase)       * 5  * sway;
          tAY = Math.sin(speakingSwayPhase * 0.6) * 2.5 * sway;
          // Eyes stay on viewer (tEX=tEY=0)
        } else {
          // Idle: eyes & head follow last interaction point with smooth decay
          const sinceMove = now - lastMouseMoveAt;
          const trackStrength = sinceMove < 4000 ? 1 : Math.max(0, 1 - (sinceMove - 4000) / 4000);
          if (trackStrength > 0) {
            const cx = currentModel.x + currentModel.width  / 2;
            const cy = currentModel.y + currentModel.height * 0.25;     // face area
            const dx = Math.max(-1, Math.min(1, (mouseX - cx) / (innerWidth  * 0.45)));
            const dy = Math.max(-1, Math.min(1, (mouseY - cy) / (innerHeight * 0.45)));
            tEX =  dx * 0.85 * trackStrength;
            tEY = -dy * 0.85 * trackStrength;
            tAX =  dx * 16  * trackStrength;
            tAY = -dy * 10  * trackStrength;
          }
          // Subtle "alive" drift on top — never fully static
          tAX += Math.sin(now * 0.00065) * 1.6;
          tAY += Math.sin(now * 0.00091 + 1.3) * 0.9;
          // Tiny eye micro-saccade
          tEX += Math.sin(now * 0.0017) * 0.04;
          tEY += Math.sin(now * 0.0023 + 1.7) * 0.03;
        }

        const gk = 1 - Math.exp(-dt / 0.15);
        gazeAngleX += (tAX - gazeAngleX) * gk;
        gazeAngleY += (tAY - gazeAngleY) * gk;
        gazeEyeX   += (tEX - gazeEyeX) * gk;
        gazeEyeY   += (tEY - gazeEyeY) * gk;

        const bodyMult = 0.3;
        setParam(core, 'ParamAngleX',    gazeAngleX);
        setParam(core, 'ParamAngleY',    gazeAngleY);
        setParam(core, 'ParamAngleZ',    gazeAngleX * 0.3 + 3);  // slight charming tilt
        setParam(core, 'ParamEyeBallX',  gazeEyeX);
        setParam(core, 'ParamEyeBallY',  gazeEyeY);
        setParam(core, 'ParamBodyAngleX', gazeAngleX * bodyMult * 0.55);
        setParam(core, 'ParamBodyAngleY', gazeAngleY * bodyMult * 0.4);
        setParam(core, 'ParamBodyAngleZ', gazeAngleX * bodyMult * 0.2);

        // Alive idle + enhanced speaking expressiveness
        const liveBreath = (Math.sin(breathPhase) + 1) * 0.5;            // 0..1
        const liveBase   = 0.12 + liveBreath * 0.06;                      // ~0.12-0.18
        // When speaking: warmer smile, deeper blush, livelier expression
        const eyeSmile = speaking ? (liveBase + 0.20) : liveBase;         // 微微眯眼笑
        setParam(core, 'ParamEyeLSmile', eyeSmile);
        setParam(core, 'ParamEyeRSmile', eyeSmile);
        const cheek = speaking ? (0.55 + liveBreath * 0.12) : (0.25 + liveBreath * 0.15);
        setParam(core, 'ParamCheek', cheek);                               // 脸红加深
        // Mouth corners raised unless jaw is wide open
        if (mouthEnvelope < 0.18) setParam(core, 'ParamMouthForm', 0.45); // 嘴角微扬

        // Eyebrows — driven by current emotion + speech emphasis
        let browYT = 0, browAT = 0, browFT = 0;
        const exprName = window.currentExprName;
        if (exprName === 'expression1')      { browYT = -0.55; browAT = -0.7; browFT = -0.3; }  // 脸黑/不爽
        else if (exprName === 'expression2') { browYT =  0.25; browAT =  0.3; browFT =  0.15; } // 脸红/害羞
        else if (exprName === 'expression3') { browYT =  0.65; browAT =  0.4; browFT =  0.45; } // 星星/兴奋
        if (speaking) browYT += mouthEnvelope * 0.18;       // brow lift on emphasized syllables
        browYT += liveBreath * 0.04;                          // gentle breath flutter
        const bk = 1 - Math.exp(-dt / 0.22);
        browYS += (browYT - browYS) * bk;
        browAS += (browAT - browAS) * bk;
        browFS += (browFT - browFS) * bk;
        // Tiny natural asymmetry between left/right
        const asym = Math.sin(now * 0.0011) * 0.025;
        setParam(core, 'ParamBrowLY',     browYS + asym);
        setParam(core, 'ParamBrowRY',     browYS - asym);
        setParam(core, 'ParamBrowLAngle', browAS);
        setParam(core, 'ParamBrowRAngle', browAS);
        setParam(core, 'ParamBrowLForm',  browFS);
        setParam(core, 'ParamBrowRForm',  browFS);

        // Blink
        if (blinkPhase === 'idle' && now >= nextBlinkAt) { blinkPhase = 'closing'; blinkPhaseStart = now; }
        if (blinkPhase === 'closing') {
          blinkValue = Math.max(0, 1 - (now - blinkPhaseStart) / 80);
          if (blinkValue <= 0) { blinkPhase = 'opening'; blinkPhaseStart = now; }
        } else if (blinkPhase === 'opening') {
          blinkValue = Math.min(1, (now - blinkPhaseStart) / 120);
          if (blinkValue >= 1) {
            blinkPhase = 'idle'; blinkValue = 1;
            nextBlinkAt = now + (Math.random() < 0.12 ? 180 : 2500 + Math.random() * 3500);
          }
        }
        setParam(core, 'ParamEyeLOpen', blinkValue);
        setParam(core, 'ParamEyeROpen', blinkValue);

        // Breath
        breathPhase += dt * 1.1;
        setParam(core, 'ParamBreath', Math.sin(breathPhase) * 0.5 + 0.5);

        // Debug param sliders (DEV panel)
        if (window._dbgP1 !== undefined) setParam(core, 'Param',  window._dbgP1);
        if (window._dbgP2 !== undefined) setParam(core, 'Param2', window._dbgP2);
        if (window._dbgP3 !== undefined) setParam(core, 'Param3', window._dbgP3);

        // Expressions (driven by us, not pixi's expression manager)
        const expr = window.currentExprName;
        setParam(core, 'Param4', expr === 'expression1' ? 1 : 0);  // 脸黑
        setParam(core, 'Param5', expr === 'expression2' ? 1 : 0);  // 脸红
        setParam(core, 'Param6', expr === 'expression3' ? 1 : 0);  // 星星眼
      });

      document.getElementById('status').innerText = 'Vega Online ✨';
      window.addEventListener('resize', () => {
        model.x = (innerWidth / 2) - (model.width * model.scale.x / 2);
      });
    } catch (e) {
      document.getElementById('status').innerText = 'Error: ' + e.message;
      console.error(e);
    }
  }

  // ── Test audio (dev) ──
  window.startTalking = function () {
    const audio = document.getElementById('testAudio');
    if (!testAudioCtx) {
      testAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      testAnalyser = testAudioCtx.createAnalyser(); testAnalyser.fftSize = 256;
      testSource = testAudioCtx.createMediaElementSource(audio);
      testSource.connect(testAnalyser); testAnalyser.connect(testAudioCtx.destination);
      testDataArray = new Uint8Array(testAnalyser.frequencyBinCount);
    }
    if (testAudioCtx.state === 'suspended') testAudioCtx.resume();
    audio.onended = () => { window.isAudioPlaying = false; };
    if (audio.paused) { audio.play().then(() => { window.isAudioPlaying = true; }); }
    else { audio.pause(); audio.currentTime = 0; window.isAudioPlaying = false; }
  };

  // We bypass pixi-live2d-display's expression manager (its clear behavior is unreliable)
  // and drive the 3 expression params directly each frame from currentExprName.
  window.currentExprName = null;
  window.setExpr   = (name) => { window.currentExprName = name; };
  window.clearExpr = () => { window.currentExprName = null; };

  // Dump every parameter the model actually exposes (with real min/max/default)
  window.dumpParams = function () {
    if (!currentModel) return;
    const c = currentModel.internalModel.coreModel;
    const n = c.getParameterCount();
    const rows = [];
    for (let i = 0; i < n; i++) {
      rows.push({
        id:   c.getParameterId(i),
        min:  c.getParameterMinimumValue(i),
        max:  c.getParameterMaximumValue(i),
        def:  c.getParameterDefaultValue(i),
        cur:  c.getParameterValue(i),
      });
    }
    console.table(rows);
    alert('已打印 ' + n + ' 个参数到 Console (按 F12 查看)');
  };

  // Cycle each parameter through min→max→min so user can SEE which controls what
  window.cycleAllParams = async function () {
    if (!currentModel) return;
    const core = currentModel.internalModel.coreModel;
    const status = document.getElementById('status');

    // Unknown params to discover — test with wide range
    const testList = [
      { id: 'Param',  min: -30, max: 30 },
      { id: 'Param2', min: -30, max: 30 },
      { id: 'Param3', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_1_ArtMesh67', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_2_ArtMesh67', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_3_ArtMesh67', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_4_ArtMesh67', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_5_ArtMesh67', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_1_ArtMesh68', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_2_ArtMesh68', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_3_ArtMesh68', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_4_ArtMesh68', min: -30, max: 30 },
      { id: 'Param_Angle_Rotation_5_ArtMesh68', min: -30, max: 30 },
    ];

    for (const { id, min, max } of testList) {
      status.innerText = `▶ 测试: ${id}`;
      for (let t = 0; t <= 1; t += 0.04) {
        try { core.setParameterValueById(id, min + (max - min) * t); } catch {}
        await new Promise(r => setTimeout(r, 30));
      }
      for (let t = 1; t >= 0; t -= 0.04) {
        try { core.setParameterValueById(id, min + (max - min) * t); } catch {}
        await new Promise(r => setTimeout(r, 30));
      }
      try { core.setParameterValueById(id, 0); } catch {}
      await new Promise(r => setTimeout(r, 600));
    }
    status.innerText = '✓ 测试完成';
  };

  window.zoomIn  = () => currentModel && (currentModel.scale.set(currentModel.scale.x * 1.1), currentModel.x = (innerWidth/2)-(currentModel.width*currentModel.scale.x/2));
  window.zoomOut = () => currentModel && (currentModel.scale.set(currentModel.scale.x * 0.9), currentModel.x = (innerWidth/2)-(currentModel.width*currentModel.scale.x/2));
  window.moveUp   = () => currentModel && (currentModel.y -= 50);
  window.moveDown = () => currentModel && (currentModel.y += 50);

  init();
</script>
</body>
</html>
