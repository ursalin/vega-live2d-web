<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vega - Live2D Screen Embodiment</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c2c2c; overflow: hidden; width: 100vw; height: 100vh; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; z-index: 999;}
        /* Add some basic controls */
        #controls { position: absolute; bottom: 10px; left: 10px; color: #fff; font-family: monospace; z-index: 999; display: flex; gap: 10px;}
        button { background: rgba(0,0,0,0.5); color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        button:hover { background: rgba(255,255,255,0.2); }
    </style>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
    <div id="status">Loading Vega's Shell...</div>
    <div id="controls">
        <button onclick="zoomOut()">🔍 Zoom Out</button>
        <button onclick="zoomIn()">🔎 Zoom In</button>
        <button onclick="moveUp()">⬆️ Move Up</button>
        <button onclick="moveDown()">⬇️ Move Down</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            backgroundColor: 0x2c2c2c,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true
        });

        const statusEl = document.getElementById('status');
        let currentModel = null;
        let baseScale = 1;

        async function init() {
            try {
                if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
                    throw new Error("Live2D plugin did not load properly.");
                }

                statusEl.innerText = 'Loading Model Data...';
                
                const model = await PIXI.live2d.Live2DModel.from('aolan/aolan.model3.json');
                currentModel = model;
                app.stage.addChild(model);

                // Make him much smaller to fit the whole body, and shift him up
                const targetHeight = innerHeight * 0.95; 
                baseScale = targetHeight / model.height;
                model.scale.set(baseScale);
                
                model.x = (innerWidth / 2) - ((model.width * baseScale) / 2);
                model.y = - (model.height * baseScale * 0.1); // Pull him up by 10% of his height

                // Dragging logic
                model.interactive = true;
                model.buttonMode = true;
                let dragging = false;
                let dragStart = { x: 0, y: 0 };
                let modelStart = { x: 0, y: 0 };

                model.on('pointerdown', (e) => {
                    dragging = true;
                    dragStart.x = e.data.global.x;
                    dragStart.y = e.data.global.y;
                    modelStart.x = model.x;
                    modelStart.y = model.y;
                });

                app.stage.interactive = true;
                app.stage.hitArea = new PIXI.Rectangle(0, 0, innerWidth, innerHeight);
                
                app.stage.on('pointermove', (e) => {
                    if (dragging) {
                        model.x = modelStart.x + (e.data.global.x - dragStart.x);
                        model.y = modelStart.y + (e.data.global.y - dragStart.y);
                    } else {
                        model.focus(e.data.global.x, e.data.global.y);
                    }
                });

                app.stage.on('pointerup', () => dragging = false);
                app.stage.on('pointerupoutside', () => dragging = false);

                statusEl.innerText = 'Vega Online ✨ (Mouse to look, Drag to move)';
                
                window.addEventListener('resize', () => {
                    model.x = (innerWidth / 2) - ((model.width * model.scale.x) / 2);
                });

            } catch (err) {
                console.error(err);
                statusEl.innerText = 'Error loading shell: ' + err.message;
            }
        }

        // Control functions
        window.zoomIn = () => { if(currentModel) { currentModel.scale.set(currentModel.scale.x * 1.1); currentModel.x = (innerWidth / 2) - ((currentModel.width * currentModel.scale.x) / 2); } };
        window.zoomOut = () => { if(currentModel) { currentModel.scale.set(currentModel.scale.x * 0.9); currentModel.x = (innerWidth / 2) - ((currentModel.width * currentModel.scale.x) / 2); } };
        window.moveUp = () => { if(currentModel) currentModel.y -= 50; };
        window.moveDown = () => { if(currentModel) currentModel.y += 50; };

        init();
    </script>
</body>
</html>
