<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vega - Live2D Screen Embodiment</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c2c2c; overflow: hidden; width: 100vw; height: 100vh; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; z-index: 999;}
    </style>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
    <div id="status">Loading Vega's Shell...</div>
    <canvas id="canvas"></canvas>

    <script>
        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            backgroundColor: 0x2c2c2c,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true
        });

        const statusEl = document.getElementById('status');

        async function init() {
            try {
                if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
                    throw new Error("Live2D plugin did not load properly.");
                }

                statusEl.innerText = 'Loading Model Data...';
                
                const model = await PIXI.live2d.Live2DModel.from('aolan/aolan.model3.json');
                app.stage.addChild(model);

                // Forcing an absolute alignment strategy:
                // We fit the height exactly to the window, and forcefully anchor to the bottom edge.
                const targetHeight = innerHeight * 1.0; 
                const scaleRatio = targetHeight / model.height;
                model.scale.set(scaleRatio);
                
                model.x = (innerWidth / 2) - ((model.width * scaleRatio) / 2);
                
                // Let's pull him UP forcefully. If he was sinking, we subtract extra offset.
                // model.y = 0 means his top head touches the top of screen.
                model.y = 0; 

                app.stage.interactive = true;
                app.stage.hitArea = new PIXI.Rectangle(0, 0, innerWidth, innerHeight);
                app.stage.on('pointermove', (event) => {
                    model.focus(event.data.global.x, event.data.global.y);
                });

                statusEl.innerText = 'Vega Online ✨ (Move mouse to interact)';
                
                window.addEventListener('resize', () => {
                    const newScaleRatio = innerHeight / model.height;
                    model.scale.set(newScaleRatio);
                    model.x = (innerWidth / 2) - ((model.width * newScaleRatio) / 2);
                    model.y = 0;
                });

            } catch (err) {
                console.error(err);
                statusEl.innerText = 'Error loading shell: ' + err.message;
            }
        }

        init();
    </script>
</body>
</html>
